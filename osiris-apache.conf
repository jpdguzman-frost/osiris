# Osiris — Apache Reverse Proxy Configuration
# Add this inside the <VirtualHost> block for aux.frostdesigngroup.com
#
# Required modules: mod_proxy, mod_proxy_http
#   sudo a2enmod proxy proxy_http
#   sudo systemctl restart apache2

ProxyPreserveHost On

# MCP Streamable HTTP endpoint (no timeout for SSE streams)
ProxyPass /osiris/mcp http://localhost:3001/osiris/mcp
ProxyPassReverse /osiris/mcp http://localhost:3001/osiris/mcp
ProxyTimeout 0

# Main Osiris app
ProxyPass /osiris http://localhost:3001/osiris
ProxyPassReverse /osiris http://localhost:3001/osiris
